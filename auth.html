<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JobHunter AI — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --accent3: #38bdf8;
    --green: #22d3a5;
    --red: #f87171;
    --text: #f0f0f8;
    --muted: #7c7c9a;
    --muted2: #4a4a62;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed; top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(108,99,255,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed; bottom: -200px; right: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(56,189,248,0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 40px;
    width: 420px;
    max-width: 95vw;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: none; }
  }

  /* LOGO */
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
    justify-content: center;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text {
    font-family: var(--font-head);
    font-size: 22px; font-weight: 800;
    letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--accent2); }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 4px;
    margin-bottom: 28px;
    border: 1px solid var(--border);
  }
  .tab {
    flex: 1; padding: 9px;
    text-align: center;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px; font-weight: 500;
    color: var(--muted);
    transition: all 0.2s;
    border: none;
    background: none;
    font-family: var(--font-body);
  }
  .tab.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  /* FORM */
  .form { display: flex; flex-direction: column; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label {
    font-size: 12px; font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.7px;
  }
  .form-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 14px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: var(--font-body);
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--muted2); }

  /* BUTTON */
  .btn-submit {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border: none;
    color: #fff;
    padding: 13px;
    border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600;
    font-family: var(--font-head);
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
    letter-spacing: 0.3px;
  }
  .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* DIVIDER */
  .divider {
    display: flex; align-items: center; gap: 12px;
    color: var(--muted2); font-size: 12px;
    margin: 4px 0;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px; background: var(--border);
  }

  /* ERROR / SUCCESS */
  .alert {
    padding: 11px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    display: none;
  }
  .alert.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25); color: var(--red); }
  .alert.success { background: rgba(34,211,165,0.1); border: 1px solid rgba(34,211,165,0.25); color: var(--green); }
  .alert.visible { display: block; }

  /* FOOTER TEXT */
  .footer-text {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 20px;
    line-height: 1.6;
  }

  /* SPINNER */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block; vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .form-panel { display: none; }
  .form-panel.active { display: flex; flex-direction: column; gap: 16px; }
</style>
</head>
<body>

<div class="card">
  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">🎯</div>
    <div class="logo-text">Job<span>Hunter</span> AI</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Sign In</button>
    <button class="tab" onclick="switchTab('register')">Create Account</button>
  </div>

  <!-- Alert -->
  <div class="alert" id="alert"></div>

  <!-- LOGIN FORM -->
  <div class="form-panel active" id="login-panel">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="login-email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="login-password" placeholder="••••••••"
        onkeydown="if(event.key==='Enter') handleLogin()"/>
    </div>
    <button class="btn-submit" id="login-btn" onclick="handleLogin()">
      Sign In →
    </button>
  </div>

  <!-- REGISTER FORM -->
  <div class="form-panel" id="register-panel">
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input class="form-input" type="text" id="reg-name" placeholder="Vamsi Krishna Pola"/>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="reg-email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="reg-password" placeholder="Min 8 characters"
        onkeydown="if(event.key==='Enter') handleRegister()"/>
    </div>
    <button class="btn-submit" id="register-btn" onclick="handleRegister()">
      Create Account →
    </button>
  </div>

  <div class="footer-text">
    Your data is private and never shared.<br/>
    Only you can see your applications and resume.
  </div>
</div>

<script>
const API_BASE = "https://jobhunter-api.up.railway.app";

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(tab + '-panel').classList.add('active');
  event.target.classList.add('active');
  hideAlert();
}

function showAlert(msg, type) {
  const el = document.getElementById('alert');
  el.textContent = msg;
  el.className = `alert ${type} visible`;
}

function hideAlert() {
  document.getElementById('alert').className = 'alert';
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (loading) {
    btn.innerHTML = '<span class="spinner"></span> Please wait...';
    btn.disabled = true;
  } else {
    btn.disabled = false;
  }
}

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  if (!email || !password) {
    showAlert('Please fill in all fields.', 'error');
    return;
  }

  setLoading('login-btn', true);
  hideAlert();

  try {
    const response = await fetch(`${API_BASE}/api/users/login?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' }
    });

    const data = await response.json();

    if (response.ok && data.success) {
      // Save user info to sessionStorage
      sessionStorage.setItem('user_id', data.user_id);
      sessionStorage.setItem('user_name', data.name);
      sessionStorage.setItem('user_email', email);

      showAlert('✅ Welcome back! Redirecting...', 'success');
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1000);
    } else {
      showAlert(data.detail || 'Invalid email or password.', 'error');
      document.getElementById('login-btn').innerHTML = 'Sign In →';
      document.getElementById('login-btn').disabled = false;
    }
  } catch (err) {
    showAlert('Connection error. Please try again.', 'error');
    document.getElementById('login-btn').innerHTML = 'Sign In →';
    document.getElementById('login-btn').disabled = false;
  }
}

async function handleRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;

  if (!name || !email || !password) {
    showAlert('Please fill in all fields.', 'error');
    return;
  }
  if (password.length < 8) {
    showAlert('Password must be at least 8 characters.', 'error');
    return;
  }

  setLoading('register-btn', true);
  hideAlert();

  try {
    const response = await fetch(`${API_BASE}/api/users/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });

    const data = await response.json();

    if (response.ok && data.success) {
      // Auto login after register
      sessionStorage.setItem('user_id', data.user_id);
      sessionStorage.setItem('user_name', data.name);
      sessionStorage.setItem('user_email', email);

      showAlert('✅ Account created! Redirecting...', 'success');
      setTimeout(() => {
        window.location.href = 'resume-parser.html';
      }, 1000);
    } else {
      showAlert(data.detail || 'Registration failed. Try a different email.', 'error');
      document.getElementById('register-btn').innerHTML = 'Create Account →';
      document.getElementById('register-btn').disabled = false;
    }
  } catch (err) {
    showAlert('Connection error. Please try again.', 'error');
    document.getElementById('register-btn').innerHTML = 'Create Account →';
    document.getElementById('register-btn').disabled = false;
  }
}

// Check if already logged in
if (sessionStorage.getItem('user_id')) {
  window.location.href = 'index.html';
}
</script>
</body>
</html>
